<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
  <div class="calc-wrap">
    <div class="calculator">
      <div class="calc-label">◈ CALC — SYS v2.4 ◈</div>

      <div class="display">
        <div class="display-expr" id="expr"></div>
        <div class="display-main" id="mainDisplay">0</div>
      </div>

      <div class="buttons">
        <!-- Row 1 -->
        <button class="btn clear" onclick="clearAll()">CLR</button>
        <button class="btn clear" onclick="clearEntry()">CE</button>
        <button class="btn op" onclick="inputOp('%')">%</button>
        <button class="btn op" onclick="inputOp('/')">÷</button>

        <!-- Row 2 -->
        <button class="btn" onclick="inputNum('7')">7</button>
        <button class="btn" onclick="inputNum('8')">8</button>
        <button class="btn" onclick="inputNum('9')">9</button>
        <button class="btn op" onclick="inputOp('*')">×</button>

        <!-- Row 3 -->
        <button class="btn" onclick="inputNum('4')">4</button>
        <button class="btn" onclick="inputNum('5')">5</button>
        <button class="btn" onclick="inputNum('6')">6</button>
        <button class="btn op" onclick="inputOp('-')">−</button>

        <!-- Row 4 -->
        <button class="btn" onclick="inputNum('1')">1</button>
        <button class="btn" onclick="inputNum('2')">2</button>
        <button class="btn" onclick="inputNum('3')">3</button>
        <button class="btn op" onclick="inputOp('+')">+</button>

        <!-- Row 5 -->
        <button class="btn" onclick="toggleSign()">+/−</button>
        <button class="btn" onclick="inputNum('0')">0</button>
        <button class="btn" onclick="inputDot()">.</button>
        <button class="btn eq" onclick="calculate()">=</button>
      </div>

      <div class="bottom-bar">
        <div class="indicator"><div class="dot"></div> ONLINE</div>
        <div class="indicator">SUFYAN.DEV</div>
      </div>
    </div>
  </div>

<script src="./script.js"></script>
</body>
</html>
